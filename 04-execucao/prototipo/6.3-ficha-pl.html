  <script>
    // Ficha parametrizada por id — cada subtipo regimental de PL (Art. 138 §1º)
    // tem rito e efeitos próprios, por isso a linha do tempo muda por entrada.
    var FICHAS = {
      'pl-58': {
        subtipo: 'Ordinário', numero: 'PL 58/2026', titulo: 'Institui a Semana Municipal da Leitura em Aracaju',

        rito: 'Rito comum (Art. 149, 179-214): comissões, 2 discussões, sanção do Prefeito.',
        timeline: [
          ['ok', 'Protocolado', '12/03/2026'],
          ['ok', 'Lido no Expediente', '16/03/2026'],
          ['ok', 'Parecer das comissões', '30/03/2026 · favorável'],
          ['ok', '1ª e 2ª discussão', '20/04/2026 e 08/05/2026'],
          ['ok', 'Enviado à sanção', '12/05/2026'],
          ['ok', 'Sancionado e promulgado', '30/05/2026']
        ],

        justificativa: 'Os índices de leitura entre estudantes da rede municipal estão abaixo da média estadual, conforme dados da última avaliação diagnóstica. A instituição de uma semana temática consolida um calendário de ações já realizadas de forma esparsa.'
      },
      'pl-71': {
        subtipo: 'Complementar', numero: 'PL 71/2026', titulo: 'Altera o Código Tributário Municipal — isenção de ISS para MEIs de zeladoria urbana',
        data: 'Protocolado em 02/06/2026', chip: ['chip-warning', 'Em Comissão'],
        rito: 'Lei Complementar (Art. 150-152): aprovação por maioria absoluta, 2 turnos com 24h de intervalo.',
        timeline: [
          ['ok', 'Protocolado', '02/06/2026'],
          ['ok', 'Lido no Expediente', '05/06/2026'],
          ['ok', 'Distribuído à CCJ', '09/06/2026 · despacho da Presidência (Art. 74 §1º)'],
          ['warning', 'Parecer da Comissão (15 dias)', 'Prazo vence em 4 dias · relator designado'],
          ['', '1º turno de votação (maioria absoluta)', 'Aguardando parecer'],
          ['', '2º turno (24h após o 1º) e sanção', 'Aguardando etapas anteriores']
        ],
        ementa: 'Altera a Lei Complementar nº 42/2015 (Código Tributário Municipal) para instituir isenção de Imposto Sobre Serviços (ISS) às microempreendedoras individuais (MEI) que prestem serviços de zeladoria urbana contratados diretamente pela Prefeitura Municipal de Aracaju, pelo prazo de 24 meses a contar da formalização.',
        justificativa: 'O Código Tributário Municipal não prevê tratamento diferenciado para prestadores individuais de zeladoria urbana de pequeno porte, desestimulando a formalização. A proposição fomenta a formalização de MEIs no setor, sem impacto relevante na arrecadação (Art. 145 §2º).'
      },
      'pl-64': {
        subtipo: 'Ordinário', numero: 'PL 64/2026', titulo: 'Dispõe sobre a arborização obrigatória em novos loteamentos',
        data: 'Protocolado em 18/04/2026', chip: ['chip-warning', 'Em discussão'],
        rito: 'Rito comum (Art. 149, 179-214): comissões, 2 discussões, sanção do Prefeito.',
        timeline: [
          ['ok', 'Protocolado', '18/04/2026'],
          ['ok', 'Lido no Expediente', '22/04/2026'],
          ['ok', 'Parecer das comissões', '10/05/2026 · favorável com emenda'],
          ['warning', '1ª discussão no Plenário', 'Em andamento'],
          ['', '2ª discussão e votação', 'Aguardando 1ª discussão'],
          ['', 'Sanção/veto', 'Aguardando etapas anteriores']
        ],
        ementa: 'Dispõe sobre a obrigatoriedade de arborização em novos loteamentos e condomínios no Município de Aracaju, estabelecendo percentual mínimo de área verde e espécies nativas recomendadas.',
        justificativa: 'O adensamento urbano recente reduziu a cobertura vegetal em bairros de expansão, agravando ilhas de calor e problemas de drenagem. A proposição condiciona novos loteamentos a contrapartidas ambientais mínimas (Art. 145 §2º).'
      },
      'pl-49': {
        subtipo: 'Ordinário', numero: 'PL 49/2026', titulo: 'Cria o Programa Municipal de Coleta Seletiva por Bairro',
        data: 'Protocolado em 20/02/2026', chip: ['chip-warning', 'Aguardando sanção'],
        rito: 'Rito comum (Art. 149, 179-214): comissões, 2 discussões, sanção do Prefeito.',
        timeline: [
          ['ok', 'Protocolado', '20/02/2026'],
          ['ok', 'Lido no Expediente', '24/02/2026'],
          ['ok', 'Parecer das comissões', '15/03/2026 · favorável'],
          ['ok', '1ª e 2ª discussão', '02/04/2026 e 20/04/2026'],
          ['ok', 'Redação final aprovada', '24/04/2026'],
          ['warning', 'No Executivo para sanção', 'Há 6 dias · prazo de 15 dias úteis (Art. 209 §4º), senão sanção tácita']
        ],
        ementa: 'Cria o Programa Municipal de Coleta Seletiva por Bairro, estabelecendo cronograma de implantação por região administrativa e metas progressivas de cobertura.',
        justificativa: 'Menos de um terço dos bairros de Aracaju têm coleta seletiva regular, segundo dados da Secretaria de Serviços Urbanos. O programa estrutura a expansão com metas e prazos definidos (Art. 145 §2º).'
      },
      'pl-33': {
        subtipo: 'Ordinário', numero: 'PL 33/2026', titulo: 'Institui bandeira tarifária de reajuste automático para o transporte coletivo',
        data: 'Protocolado em 15/01/2026', chip: ['chip-danger', 'Vetado'],
        rito: 'Rito comum (Art. 149, 179-214): comissões, 2 discussões, sanção do Prefeito.',
        timeline: [
          ['ok', 'Protocolado', '15/01/2026'],
          ['ok', 'Lido no Expediente', '19/01/2026'],
          ['ok', 'Parecer das comissões', '05/02/2026 · favorável'],
          ['ok', '1ª e 2ª discussão', '20/02/2026 e 10/03/2026'],
          ['ok', 'Aprovado e enviado à sanção', '13/03/2026'],
          ['danger', 'Vetado integralmente', '25/03/2026 · vetado pelo Executivo, sem apreciação de recurso até o momento']
        ],
        ementa: 'Institui mecanismo de reajuste tarifário automático para o transporte coletivo municipal, vinculado a índice de inflação setorial, dispensando decreto específico a cada reajuste.',
        justificativa: 'O modelo atual de reajuste por decreto gera insegurança para operadores e atrasos recorrentes na recomposição tarifária, impactando a qualidade do serviço (Art. 145 §2º).'
      },
      'pl-91': {
        subtipo: 'Decreto Legislativo', numero: 'PL 91/2026', titulo: 'Susta os efeitos do Decreto Municipal nº 45/2026',
        data: 'Protocolado em 08/07/2026', chip: ['chip-warning', 'Em discussão'],
        rito: 'Projeto de Decreto Legislativo (Art. 154-155): sem sanção do Prefeito, efeitos externos, promulgado pela Mesa.',
        timeline: [
          ['ok', 'Protocolado', '08/07/2026'],
          ['ok', 'Lido no Expediente', '10/07/2026'],
          ['ok', 'Distribuído à CCJ', '13/07/2026'],
          ['warning', 'Parecer da CCJ', 'Em análise — o Decreto teria exorbitado do poder regulamentar'],
          ['', 'Discussão e votação', 'Aguardando parecer'],
          ['', 'Promulgação pela Mesa (sem sanção do Prefeito)', 'Aguardando votação']
        ],
        ementa: 'Susta os efeitos do Decreto Municipal nº 45/2026, por exorbitar do poder regulamentar ao criar obrigação não prevista em lei, nos termos do Art. 154 do Regimento Interno.',
        justificativa: null
      },
      'pl-95': {
        subtipo: 'Resolução', numero: 'PL 95/2026', titulo: 'Cria a Comissão de Acompanhamento de Convênios',
        data: 'Protocolado em 16/07/2026', chip: ['chip-neutral', 'Em Comissão'],
        rito: 'Projeto de Resolução (Art. 156): efeitos internos à Casa, sem sanção do Prefeito, promulgado pela Mesa.',
        timeline: [
          ['ok', 'Protocolada', '16/07/2026'],
          ['ok', 'Lida no Expediente', '18/07/2026'],
          ['warning', 'Distribuída à CCJ', 'Em análise'],
          ['', 'Discussão e votação', 'Aguardando parecer'],
          ['', 'Promulgação pela Mesa (efeitos internos)', 'Aguardando votação']
        ],
        ementa: 'Cria, no âmbito da Câmara Municipal de Aracaju, a Comissão de Acompanhamento de Convênios, com atribuição de monitorar a execução de convênios firmados pelo Município.',
        justificativa: null
      }
    };

    var id = new URLSearchParams(window.location.search).get('id') || 'pl-71';
    var f = FICHAS[id] || FICHAS['pl-71'];

    document.title = 'VeredaTech — ' + f.titulo;
    document.getElementById('subtypeTag').textContent = f.subtipo;
    document.getElementById('eyebrow').textContent = f.numero;
    document.getElementById('titulo').textContent = f.titulo;
    document.getElementById('dataProtocolo').textContent = f.data + ' · Origem: SAPL';
    document.getElementById('chipEstado').className = 'chip ' + f.chip[0];
    document.getElementById('chipEstado').textContent = f.chip[1];
    document.getElementById('ritoNota').textContent = f.rito;

    var tl = document.getElementById('timeline');
    f.timeline.forEach(function(ev){
      var div = document.createElement('div');
      div.className = 'timeline-event';
      div.innerHTML = '<span class="timeline-dot ' + ev[0] + '"></span>' +
        '<div class="timeline-body"><b>' + ev[1] + '</b><span>' + ev[2] + '</span></div>';
      tl.appendChild(div);
    });

    document.getElementById('readerEyebrow').textContent = f.numero + ' · Projeto de Lei (' + f.subtipo + ')';
    document.getElementById('readerTitulo').textContent = f.titulo;
    var body = '<h4>Ementa</h4><p>' + f.ementa + '</p>';
    if (f.justificativa){ body += '<h4>Justificativa</h4><p>' + f.justificativa + '</p>'; }
    document.getElementById('readerBody').innerHTML = body;

    (function(){
      var overlay = document.getElementById('readerOverlay');
      document.querySelectorAll('[data-reader-open]').forEach(function(btn){
        btn.addEventListener('click', function(e){ e.preventDefault(); overlay.classList.add('is-open'); });
      });
      document.getElementById('readerClose').addEventListener('click', function(){ overlay.classList.remove('is-open'); });
      overlay.addEventListener('click', function(e){ if(e.target === overlay) overlay.classList.remove('is-open'); });
      document.getElementById('readerDownload').addEventListener('click', function(e){ e.preventDefault(); });
    })();
  </script>
</body>
</html>
